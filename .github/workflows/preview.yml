name: PR Preview (Cloudflare Pages)

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: whitney-portfolio
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Get case slug
        id: slug
        run: |
          SLUG=$(git diff --name-only origin/main...HEAD -- src/content/cases/ | head -1 | sed 's|src/content/cases/||' | sed 's|\.mdx||')
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const slug = '${{ steps.slug.outputs.slug }}';
            const caseUrl = slug ? `${url}/cases/${slug}` : url;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Preview ready\n\n| | |\n|---|---|\n| **Case** | \`${slug || 'unknown'}\` |\n| **Direct link** | ${caseUrl} |\n| **Site root** | ${url} |`
            });
